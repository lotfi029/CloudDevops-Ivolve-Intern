initContainers:
  - name: init-db
    image: mysql:5.7
    env:
      - name: DB_HOST
        valueFrom:
          configMapKeyRef:
            name: mysql-config
            key: DB_HOST
      - name: DB_USER
        valueFrom:
          configMapKeyRef:
            name: mysql-config
            key: DB_USER
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysql-secret
            key: DB_PASSWORD
      - name: MYSQL_ROOT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysql-secret
            key: MYSQL_ROOT_PASSWORD
    command:
      - /bin/sh
      - -c
      - |
        until mysql -h$DB_HOST -uroot -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"; do
          echo "Waiting for MySQL..."
          sleep 3
        done
        mysql -h$DB_HOST -uroot -p$MYSQL_ROOT_PASSWORD <<SQL
          CREATE DATABASE IF NOT EXISTS ivolve;
          CREATE USER IF NOT EXISTS '$DB_USER'@'%' IDENTIFIED BY '$DB_PASSWORD';
          GRANT ALL PRIVILEGES ON ivolve.* TO '$DB_USER'@'%';
          FLUSH PRIVILEGES;
        SQL
        echo "Database initialized."
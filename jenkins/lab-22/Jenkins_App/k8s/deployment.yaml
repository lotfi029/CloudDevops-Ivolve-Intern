apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivolve-jenkins-app
  namespace: ivolve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ivolve-jenkins-app
  template:
    metadata:
      labels:
        app: ivolve-jenkins-app
    spec:
      containers:
        - name: ivolve-jenkins-app
          image: YOUR_DOCKERHUB_USERNAME/ivolve-jenkins-app:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ivolve-jenkins-app-service
  namespace: ivolve
spec:
  type: ClusterIP
  selector:
    app: ivolve-jenkins-app
  ports:
    - port: 8080
      targetPort: 8080

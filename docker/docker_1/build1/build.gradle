plugins {
    id 'java'
    id 'application'
}

group = 'com.ivolve'
version = '1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'com.ivolve.App'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.ivolve.App'
        )
    }
    archiveBaseName = "ivolve-app"
    archiveVersion = ""
    archiveClassifier = ""
}

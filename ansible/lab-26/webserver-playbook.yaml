---
- name: Configure Nginx Web Server
  hosts: managed_nodes
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Customize the web page
      copy:
        content: |
          <html>
          <head><title>iVolve Lab 26</title></head>
          <body>
            <h1>Hello from iVolve Ansible Lab!</h1>
            <p>Web server configured by Ansible.</p>
          </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Reload Nginx to serve new content
      service:
        name: nginx
        state: reloaded
